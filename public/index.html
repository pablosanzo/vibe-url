<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vibe-url — type it. build it.</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #111113;
      --border: #1e1e22;
      --text: #e8e8ed;
      --text-dim: #6b6b76;
      --accent: #ff6b2b;
      --accent-glow: rgba(255, 107, 43, 0.12);
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding-bottom: 3rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
    }

    .glow {
      position: fixed;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 720px;
      padding: 2rem;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .logo {
      font-family: var(--sans);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 1rem;
      color: var(--text-dim);
      margin-bottom: 3rem;
      letter-spacing: 0.02em;
    }

    /* URL input area */
    .url-bar {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.25rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    .url-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .url-prefix {
      font-size: 0.85rem;
      color: var(--text-dim);
      padding: 0.75rem 0 0.75rem 1rem;
      white-space: nowrap;
      user-select: none;
    }

    .url-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      padding: 0.75rem 0.5rem;
      min-width: 0;
    }

    .url-input::placeholder {
      color: var(--text-dim);
      opacity: 0.5;
    }

    .go-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      white-space: nowrap;
    }

    .go-btn:hover { opacity: 0.9; }
    .go-btn:active { transform: scale(0.97); }

    /* Ticker */
    .ticker-wrap {
      width: 100vw;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 1rem;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
    }

    .ticker {
      display: flex;
      gap: 0.5rem;
      width: max-content;
      animation: ticker-scroll 60s linear infinite;
    }

    .ticker:hover {
      animation-play-state: paused;
    }

    @keyframes ticker-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .ticker-item {
      font-size: 0.7rem;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ticker-item:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .showcase-heading {
      font-size: 1rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
      margin-top: 3rem;
      margin-bottom: 1.5rem;
    }

    /* Showcase examples */
    .showcase {
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      text-align: left;
    }

    @media (max-width: 600px) {
      .showcase { grid-template-columns: 1fr; }
    }

    .showcase-card {
      position: relative;
      aspect-ratio: 5/3;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .showcase-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .showcase-word {
      font-family: var(--sans);
      font-size: clamp(1.3rem, 2.5vw, 1.6rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.2;
      text-align: center;
      padding: 1.25rem;
      transition: opacity 0.25s ease;
      z-index: 2;
    }

    .showcase-word em {
      font-style: normal;
      color: var(--accent);
    }

    .showcase-sub {
      display: block;
      font-size: 0.7em;
      color: var(--text-dim);
      font-weight: 500;
      margin-top: 0.3rem;
    }

    .showcase-hover {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 3;
    }

    .showcase-card:hover .showcase-word {
      opacity: 0;
    }

    .showcase-card:hover .showcase-hover {
      opacity: 1;
    }

    .showcase-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .showcase-img-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .showcase-slug {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.75rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .showcase-slug::before {
      content: 'vibe-url.com/';
      color: var(--text-dim);
    }

    /* Footer with Mistral branding */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .footer:hover {
      opacity: 1;
    }

    .footer-text {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .footer-logo {
      height: 14px;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <h1 class="logo">vibe<span>-</span>url</h1>
    <p class="tagline">type it in the url. get a working app.</p>

    <form class="url-bar" id="urlForm">
      <span class="url-prefix">vibe-url.com/</span>
      <input
        class="url-input"
        id="urlInput"
        type="text"
        placeholder="a-pomodoro-timer-with-ambient-sounds"
        autocomplete="off"
        autofocus
      />
      <button type="submit" class="go-btn">build</button>
    </form>

    <div class="ticker-wrap" id="tickerWrap" style="display:none">
      <div class="ticker" id="ticker"></div>
    </div>

    <div class="showcase-heading">what it's good for:</div>
    <div class="showcase">
      <a class="showcase-card" href="/a-pomodoro-timer" data-showcase>
        <div class="showcase-word">tiny <em>useful</em> apps, in seconds</div>
        <div class="showcase-hover">
          <div class="showcase-img-placeholder"></div>
          <div class="showcase-slug">a-pomodoro-timer</div>
        </div>
      </a>
      <a class="showcase-card" href="/periodic-table-of-elements" data-showcase>
        <div class="showcase-word">good vibes only<span class="showcase-sub">(we have a constitution)</span></div>
        <div class="showcase-hover">
          <div class="showcase-img-placeholder"></div>
          <div class="showcase-slug">periodic-table-of-elements</div>
        </div>
      </a>
      <a class="showcase-card" href="/a-full-chess-game-with-ai-opponent" data-showcase>
        <div class="showcase-word">can do <em>complex</em> things too!</div>
        <div class="showcase-hover">
          <div class="showcase-img-placeholder"></div>
          <div class="showcase-slug">a-full-chess-game-with-ai-opponent</div>
        </div>
      </a>
    </div>
  </div>

  <a class="footer" href="https://mistral.ai/products/vibe" target="_blank" rel="noopener">
    <span class="footer-text">powered by</span>
    <svg class="footer-logo" viewBox="0 0 191 136" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M54.3219 0H27.1528V27.0892H54.3219V0Z" fill="#FFD800"/>
      <path d="M162.984 0H135.815V27.0892H162.984V0Z" fill="#FFD800"/>
      <path d="M81.482 27.0913H27.1528V54.1805H81.482V27.0913Z" fill="#FFAF00"/>
      <path d="M162.99 27.0913H108.661V54.1805H162.99V27.0913Z" fill="#FFAF00"/>
      <path d="M162.971 54.168H27.1528V81.2572H162.971V54.168Z" fill="#FF8205"/>
      <path d="M54.3219 81.2593H27.1528V108.349H54.3219V81.2593Z" fill="#FA500F"/>
      <path d="M108.661 81.2593H81.4917V108.349H108.661V81.2593Z" fill="#FA500F"/>
      <path d="M162.984 81.2593H135.815V108.349H162.984V81.2593Z" fill="#FA500F"/>
      <path d="M81.4879 108.339H-0.00146484V135.429H81.4879V108.339Z" fill="#E10500"/>
      <path d="M190.159 108.339H108.661V135.429H190.159V108.339Z" fill="#E10500"/>
    </svg>
    <span class="footer-text">mistral vibe</span>
  </a>

  <script>
    const form = document.getElementById('urlForm');
    const input = document.getElementById('urlInput');

    // Replace spaces with dashes as user types
    input.addEventListener('input', () => {
      const pos = input.selectionStart;
      const before = input.value;
      input.value = before.replace(/ /g, '-');
      input.selectionStart = input.selectionEnd = pos;
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const raw = input.value.trim();
      if (!raw) return;
      const slug = raw
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9\-_]/g, '')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
      if (slug) {
        window.location.href = '/' + slug;
      }
    });

    // Load ticker with latest built apps
    fetch('/api/latest')
      .then(r => r.json())
      .then(({ slugs }) => {
        if (!slugs || slugs.length === 0) return;
        const ticker = document.getElementById('ticker');
        const tickerWrap = document.getElementById('tickerWrap');
        const minItems = Math.max(1, Math.ceil(30 / slugs.length));
        const oneSet = [];
        for (let i = 0; i < minItems; i++) oneSet.push(...slugs);
        const all = [...oneSet, ...oneSet];
        ticker.innerHTML = all.map(s =>
          `<a class="ticker-item" href="/${s}">${s}</a>`
        ).join('');
        const duration = Math.max(60, oneSet.length * 6);
        ticker.style.animationDuration = duration + 's';
        tickerWrap.style.display = '';
      })
      .catch(() => {});

    // Handle ?improve=slug from the branding bar
    const params = new URLSearchParams(window.location.search);
    const improve = params.get('improve');
    if (improve) {
      input.value = improve;
      input.focus();
      // Clean URL without reload
      history.replaceState(null, '', '/');
    }
  </script>
</body>
</html>
